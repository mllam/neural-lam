name: Auto-update Mermaid Diagrams

on:
  push:
    branches: [main]

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate diagrams
        run: |
          rm -rf docs/diagrams/structure/* docs/diagrams/dataflow/*
          python neural_lam/dig_generator.py --mode structure
          python neural_lam/dig_generator.py --mode dataflow

      - name: Validate diagrams
        run: python neural_lam/dig_validator.py --mode all

      - name: Commit updated diagrams if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams
          git diff-index --quiet HEAD || git commit -m "Auto-update Mermaid diagrams"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
