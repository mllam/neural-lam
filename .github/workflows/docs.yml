name: Documentation
on:
  push:
    branches: ["main"]
    paths:
      - "neural_lam/**"
      - "docs/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "neural_lam/**"
      - "docs/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: interrogate (fail-under 50)
        run: |
          pdm run interrogate neural_lam/ \
            --fail-under 50 --verbose --generate-badge docs/ \
            2>&1 | tee docs/interrogate_report.txt
      - name: pydocstyle (non-blocking)
        run: |
          pdm run pydocstyle neural_lam/ --convention=numpy --add-ignore=D100,D104,D105 || true
      - name: jupyter-book build
        run: jupyter-book build docs/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: jupyter-book build
        run: jupyter-book build docs/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/
      - id: deployment
        uses: actions/deploy-pages@v4
