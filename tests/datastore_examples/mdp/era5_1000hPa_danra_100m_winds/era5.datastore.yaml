schema_version: v0.5.0
dataset_version: v1.0.0

output:
  variables:
    static: [grid_index, static_feature]
    forcing: [time, grid_index, forcing_feature]
  coord_ranges:
    time:
      start: 2022-03-30T00:00
      end: 2022-04-12T00:00
      step: PT6H
  chunking:
    time: 1
  splitting:
    dim: time
    splits:
      train:
        start: 2022-03-30T00:00
        end: 2022-04-12T00:00
        compute_statistics:
          ops: [mean, std, diff_mean, diff_std]
          dims: [grid_index, time]
      val:
        start: 2022-03-30T00:00
        end: 2022-04-12T00:00
      test:
        start: 2022-03-30T00:00
        end: 2022-04-12T00:00
  # Second-pass crop: keep only ERA5 points within `margin_width_degrees`
  # of the interior dataset's convex hull. Follows the documented mllam
  # pattern in `example.era5_cropped.yaml` -- the dim_mapping below stacks
  # `[longitude, latitude]` directly into `grid_index` (no rename) so that
  # convex-hull cropping can find lat/lon coords by name.
  domain_cropping:
    margin_width_degrees: 10
    interior_dataset_config_path: danra.datastore.yaml
    include_interior_points: true

inputs:
  era_height_levels:
    path: 'gs://weatherbench2/datasets/era5/1959-2023_01_10-6h-64x32_equiangular_conservative.zarr'
    dims: [time, longitude, latitude, level]
    # First-pass crop on the source lat/lon dims to keep the test dataset
    # small. Region covers DANRA + a ~10 degree margin.
    coord_ranges:
      latitude: {start: 40, end: 75}
      longitude: {start: 0, end: 30}
    variables:
      u_component_of_wind:
        level:
          values: [1000,]
          units: hPa
    dim_mapping:
      time:
        method: rename
        dim: time
      forcing_feature:
        method: stack_variables_by_var_name
        dims: [level]
        name_format: "{var_name}{level}hPa"
      grid_index:
        method: stack
        dims: [longitude, latitude]
    target_output_variable: forcing

  era5_surface:
    path: 'gs://weatherbench2/datasets/era5/1959-2023_01_10-6h-64x32_equiangular_conservative.zarr'
    dims: [time, longitude, latitude, level]
    coord_ranges:
      latitude: {start: 40, end: 75}
      longitude: {start: 0, end: 30}
    variables:
      - mean_sea_level_pressure
    dim_mapping:
      time:
        method: rename
        dim: time
      forcing_feature:
        method: stack_variables_by_var_name
        name_format: "{var_name}"
      grid_index:
        method: stack
        dims: [longitude, latitude]
    target_output_variable: forcing

  era5_static:
    path: 'gs://weatherbench2/datasets/era5/1959-2023_01_10-6h-64x32_equiangular_conservative.zarr'
    dims: [time, longitude, latitude, level]
    coord_ranges:
      latitude: {start: 40, end: 75}
      longitude: {start: 0, end: 30}
    variables:
      - land_sea_mask
    dim_mapping:
      static_feature:
        method: stack_variables_by_var_name
        name_format: "{var_name}"
      grid_index:
        method: stack
        dims: [longitude, latitude]
    target_output_variable: static

extra:
  projection:
    class_name: PlateCarree
    kwargs:
      central_longitude: 0.0
