version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  commands:
    - pip install uv
    - uv pip install --system -e ".[cpu,docs]"
    - mkdir -p docs/_static/uml
    - pyreverse -o mmd -p models neural_lam.models -d docs/_static/uml/ || true
    - jupyter-book build docs/
    - cp -r docs/_build/html/* $READTHEDOCS_OUTPUT/html/
