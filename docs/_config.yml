# docs/_config.yml

title: "Neural-LAM"
author: "MLLAM Community"
copyright: "2024–2026"

logo: "_static/logo.png"
favicon: "_static/favicon.ico"

repository:
  url: "https://github.com/mllam/neural-lam"
  branch: "main"
  path_to_book: "docs"

launch_buttons:
  binderhub_url: "https://mybinder.org"
  colab_url: "https://colab.research.google.com"

execute:
  execute_notebooks: "off"

exclude_patterns:
  - _build
  - Thumbs.db
  - .DS_Store
  - "**.ipynb_checkpoints"
  - _static
  - scripts

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist
    - deflist
    - fieldlist
    - html_admonition
    - html_image
    - smartquotes
    - attrs_inline
  myst_url_schemes: [mailto, http, https]

sphinx:
  extra_extensions:
    - "scripts.autoapi_astroid_patch"
    - "autoapi.extension"
    - "sphinx.ext.napoleon"
    - "sphinx.ext.viewcode"
    - "sphinx.ext.intersphinx"
    - "sphinx_copybutton"
    - "sphinxcontrib.mermaid"
    - "sphinxext.opengraph"

  local_extensions:
    scripts.autoapi_astroid_patch: "."

  config:
    html_theme: "sphinx_book_theme"
    html_theme_options:
      repository_url: "https://github.com/mllam/neural-lam"
      use_repository_button: true
      use_issues_button: true
      use_edit_page_button: true
      repository_branch: "main"
      path_to_docs: "docs"
      show_navbar_depth: 2
      navigation_with_keys: false
      show_toc_level: 2
      logo:
        text: "Neural-LAM"
      announcement: ""
      extra_footer: |
        <p>Built with <a href="https://jupyterbook.org">Jupyter Book</a> |
        <a href="https://github.com/mllam/neural-lam">Source</a></p>

    html_static_path: ["_static"]
    html_css_files: ["custom.css"]

    # ── AutoAPI ──
    autoapi_dirs: ["../neural_lam"]
    autoapi_root: "api"
    autoapi_type: "python"
    autoapi_options:
      - "members"
      - "undoc-members"
      - "show-inheritance"
      - "show-module-summary"
    autoapi_python_class_content: "both"
    autoapi_member_order: "groupwise"
    autoapi_python_use_implicit_namespaces: false
    autoapi_keep_files: true
    autoapi_add_toctree_entry: true
    autoapi_ignore: ["**/tests/**", "**/conftest.py"]

    # ── Napoleon ──
    napoleon_numpy_docstring: true
    napoleon_google_docstring: false
    napoleon_include_init_with_doc: true
    napoleon_include_private_with_doc: false
    napoleon_include_special_with_doc: false
    napoleon_use_param: true
    napoleon_use_rtype: true

    # ── Intersphinx ──
    intersphinx_mapping:
      python: ["https://docs.python.org/3", null]
      numpy: ["https://numpy.org/doc/stable", null]
      torch: ["https://pytorch.org/docs/stable", null]
      pytorch_lightning: ["https://lightning.ai/docs/pytorch/stable/", null]
      torch_geometric: ["https://pytorch-geometric.readthedocs.io/en/latest/", null]

    # ── Mermaid ──
    mermaid_d3_zoom: false
    mermaid_version: "11"

    # ── Suppress Warnings ──
    suppress_warnings: ["autoapi.python_import_resolution"]

    # ── OpenGraph ──
    ogp_site_url: "https://mllam.github.io/neural-lam/"
    ogp_image: "_static/logo.png"
    ogp_use_first_image: true
