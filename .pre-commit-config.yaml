repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        description: Check for spelling errors
        # codespell reads [tool.codespell] from pyproject.toml via tomllib,
        # which is unavailable on Python <3.11 unless `tomli` is installed;
        # on such runners the config silently fails to load. Pass --skip
        # explicitly so it doesn't depend on that.
        args:
          - --skip=requirements/*,docs/notebooks/hello_world_danra.ipynb

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        description: Format Python code

  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort
        description: Group and sort Python imports

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        description: Check Python code for correctness, consistency and adherence to best practices
        additional_dependencies: [Flake8-pyproject]
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        description: Ensure documentation coverage stays perfect
        pass_filenames: false
        args: ["-c", "pyproject.toml", "neural_lam"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-Pillow, types-tqdm]
        description: Check for type errors

  - repo: local
    hooks:
      - id: graph-storage-spec
        name: Regenerate graph storage spec from validator
        entry: python docs/validate_graph.py --write-spec-to-path docs/graph_storage_spec.md
        language: python
        additional_dependencies: [PyYAML]
        pass_filenames: false
        files: ^docs/(validate_graph\.py|graph_storage_spec\.md)$
